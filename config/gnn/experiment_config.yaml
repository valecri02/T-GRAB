defaults:
  - _self_
  - dataset: cause_effect
  - model: tgn_provids
  - training: tgn_training
  - batching: tgn_loader
  - override hydra/launcher: joblib

trainer: ${dataset.trainer_package}.${model.trainer_name}

args:
  data: ${dataset.data}
  data_loc: ${dataset.data_loc}
  root_load_save_dir: ${dataset.root_load_save_dir}
  node_feat: ${dataset.node_feat}
  node_feat_dim: ${dataset.node_feat_dim}
  seed: ${dataset.seed}
  num_epoch: ${training.num_epoch}
  patience: ${training.patience}
  tolerance: ${training.tolerance}
  num_run: ${training.num_run}
  lr: ${training.lr}
  device: ${training.device}
  val_first_metric: ${training.val_first_metric}
  train_eval_gap: ${training.train_eval_gap}
  replay_memory_before_eval: ${training.replay_memory_before_eval}
  clear_results: ${training.clear_results}
  eval_mode: ${training.eval_mode}
  wandb_project: ${dataset.wandb_project}
  wandb_entity: ${training.wandb_entity}
  wandb_log_interval: ${training.wandb_log_interval}
  node_pos: ${training.node_pos}
  num_epochs_to_visualize: ${training.num_epochs_to_visualize}
  train_batch_size: ${batching.train_batch_size}
  train_snapshot_based: ${batching.train_snapshot_based}
  num_units: ${model.num_units}
  num_heads: ${model.num_heads}
  dropout: ${model.dropout}
  num_neighbors: ${model.num_neighbors}
  time_feat_dim: ${model.time_feat_dim}
  memory_dim: ${oc.select:model.memory_dim,null}
  memory_enhancement: ${oc.select:model.memory_enhancement,null}
  message_aggregator: ${oc.select:model.message_aggregator,null}
  mlstm_num_heads: ${oc.select:model.mlstm_num_heads,null}
  mlstm_state_max_nodes: ${oc.select:model.mlstm_state_max_nodes,null}

hydra:
  job:
    chdir: false
  run:
    dir: /work3/s253892/T-GRAB/scratch/res/hydra
  sweep:
    dir: /work3/s253892/T-GRAB/scratch/res/hydra/multirun
    subdir: ${hydra.job.num}
  launcher:
    n_jobs: 1
  sweeper:
    params:
      dataset.lag: 1,4,8,16,32,64
      dataset.seed: 3457
